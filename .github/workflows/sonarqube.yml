name: SonarQube

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CITATION.cff'
      - '.gitignore'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CITATION.cff'
      - '.gitignore'

concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    # Dependabot PRs run without repo secrets, so SONAR_TOKEN is empty and the
    # scan fails. Skip; the scan runs again when the PR merges into main.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test and coverage
        run: npm test -- --coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        # Non-blocking since 2026-07-18: the stored SONAR_TOKEN returns HTTP
        # 403 (expired/revoked — red on every push since 2026-07-03). Rotate
        # the token at sonarcloud.io → repo secret SONAR_TOKEN, then remove
        # continue-on-error so the quality gate blocks again.
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
