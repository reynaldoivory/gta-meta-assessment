sonar.projectKey=reynaldoivory_gta-meta-assessment
sonar.organization=reynaldoivory
sonar.host.url=https://sonarcloud.io

# Source layout
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.{test,spec}.{js,jsx,ts,tsx}

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Exclude UI and integration-level layers from coverage scoring.
# These are validated via manual QA and future E2E, not unit tests.
sonar.coverage.exclusions=\
  src/main.jsx,\
  src/App.jsx,\
  src/**/*.css,\
  src/components/**/*.{jsx,tsx},\
  src/views/**/*.{jsx,tsx},\
  src/context/**/*.{ts,tsx},\
  src/types/**/*.ts,\
  src/data/**/*.ts,\
  src/config/**/*.ts,\
  scripts/**

# Exclude generated/vendored/archived content from analysis entirely
sonar.exclusions=\
  dist/**,\
  coverage/**,\
  node_modules/**,\
  .venv/**,\
  docs/archive/**,\
  public/data/**
